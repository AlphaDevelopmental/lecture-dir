<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTTP METHODS</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            text-align: center;
        }
        p {
            font-size: 24px;
            font-weight: bold;
        }
        ul {
            list-style-type: none;
            padding: 0;
        }
        li {
            margin-bottom: 5px;
        }
        form {
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <p>HTTP METHODS</p>
    <ul>
        <li>GET</li>
        <li>POST</li>
        <li>PUT</li>
        <li>DELETE</li>
        <li>PATCH</li>
    </ul>

    <form action="#" method="post">
        <input type="text" name="name" placeholder="Enter your name">
        <input type="password" name="age" placeholder="Enter your password">
        <input type="submit">
    </form>
   
</body>
</html>
